
version: '3.8'

services:
  fazenda-impressao:
    build: .
    container_name: Fazenda_3D
    ports:
      - "5000:5000"
    volumes:
      # Mapeia a pasta backend inteira para uma pasta de dados interna
      # Isso garante que arquivos criados pelo Python persistam corretamente
      - ./backend:/app/data
      # Mantém o mapeamento de uploads
      - ./backend/uploads:/app/uploads
    restart: always

  # --- ADICIONANDO O TÚNEL AQUI ---

  #docker run cloudflare/cloudflared:latest tunnel --no-autoupdate run --token eyJhIjoiOWFjZDVkMjBhMDAyNTEzYTkxMmFlMWVlNGJjMzJkNGEiLCJ0IjoiYjhkMjYwZWMtM2QyOS00ZGQ0LTg4N2MtOWVlMzc5Y2IyNzNiIiwicyI6Ilpqa3pOVFkzTVdJdFlXSXhPUzAwT1RJd0xUZ3hZamt0WW1KbFlUazRNVEkxWXpnMCJ9
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare_tunnel
    restart: always
    # Mudamos o 'command' para ler o token diretamente da variável de ambiente
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
