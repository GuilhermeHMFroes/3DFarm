version: '3.8'

services:
  backend:
    build: ./backend
    container_name: fazenda_backend
    restart: always
    expose:
      - "5000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: fazenda_frontend
    restart: always
    # O frontend agora roda na 80 dentro do container dele
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: fazenda_nginx
    ports:
      - "3000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    restart: always