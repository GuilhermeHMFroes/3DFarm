server {
    listen 80;

    # 1. Roteamento para o Backend (API e Auth)
    # Verifique se o seu frontend usa /api/auth ou apenas /auth
    location ~ ^/(auth|api|printers|dashboard|settings) {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 2. Roteamento para o Socket.io (essencial para monitoramento)
    location /socket.io {
        proxy_pass http://backend:5000/socket.io;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # 3. Roteamento padrão para o Frontend
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}